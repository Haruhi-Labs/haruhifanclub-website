# cliff.toml —— git-cliff 配置（haruhifanclub monorepo）
#
# 用法：
#   生成/更新完整 CHANGELOG（基于全部历史 tag）：
#     git cliff -o CHANGELOG.md
#   为某个尚未打出的版本预览（把 [Unreleased] 当作 vX.Y.Z 渲染）：
#     git cliff --tag v0.1.0
#   只取最新一个 tag 区间（CI release.yml 用此模式生成单次 Release 正文）：
#     git cliff --latest
#
# 说明：
#   - 仅收录符合 Conventional Commits 的提交；规范自 v0.1.0 起向前生效，
#     更早的历史非规范提交会被 filter_unconventional 过滤，不污染 CHANGELOG。
#   - type→分组映射见下方 [git].commit_parsers。

[changelog]
# CHANGELOG 顶部固定标题与说明（Markdown）
header = """
# 更新日志

本 CHANGELOG 由 [git-cliff](https://git-cliff.org) 依据 [Conventional Commits](https://www.conventionalcommits.org/zh-hans/) 自动生成。

版本规范自 v0.1.0 起向前生效；更早的历史提交从略。
"""

# 每个版本区块的正文模板（Tera 语法）
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [未发布]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**：{% endif %}\
{{ commit.message | split(pat="\n") | first | upper_first }}\
 (`{{ commit.id | truncate(length=7, end="") }}`)\
{% endfor %}
{% endfor %}\n
"""

# 版本区块之间不额外裁剪空白由 trim 控制
trim = true

# CHANGELOG 末尾固定脚注
footer = """
<!-- 由 git-cliff 生成；请勿手动编辑各版本区块。 -->
"""

# 渲染前对提交信息做的全局清洗（去掉首尾空白）
postprocessors = []

[git]
# 启用 Conventional Commits 解析
conventional_commits = true
# 过滤不符合 Conventional Commits 的提交（历史非规范提交不进 CHANGELOG）
filter_unconventional = true
# 不把单条提交按正则拆成多条
split_commits = false
# 提交信息预处理（此处无需替换）
commit_preprocessors = []

# type → 分组 的解析规则；按顺序匹配，未命中规则的 type 归入兜底"其它"
commit_parsers = [
    { message = "^feat", group = "✨ 新功能" },
    { message = "^fix", group = "🐛 修复" },
    { message = "^perf", group = "⚡ 性能" },
    { message = "^refactor", group = "♻️ 重构" },
    { message = "^docs", group = "📝 文档" },
    { message = "^revert", group = "⏪ 回滚" },
    { message = "^build", group = "📦 构建" },
    # 噪声类提交不进 CHANGELOG
    { message = "^chore", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^ci", skip = true },
    # 其余符合规范但未列举的 type 归入"其它"
    { message = ".*", group = "🔧 其它" },
]

# 保护破坏性变更：即便其 type 命中 skip 也不丢弃，并单独标注
protect_breaking_commits = true
# 过滤掉被 skip 规则命中的提交
filter_commits = true

# 仅识别形如 v1.2.3 的 tag 作为版本
tag_pattern = "v[0-9]*"

# 版本内提交排序：按拓扑序取版本，组内提交按时间倒序
topo_order = true
sort_commits = "newest"
