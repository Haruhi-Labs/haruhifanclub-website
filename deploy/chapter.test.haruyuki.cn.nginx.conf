# Chapter 测试子域；使用测试后端 17778，并禁止搜索引擎收录。
server {
    listen 80;
    listen [::]:80;
    server_name chapter.test.haruyuki.cn;
    location ^~ /.well-known/acme-challenge/ { root /var/www/haruhifanclub-test; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chapter.test.haruyuki.cn;
    ssl_certificate     /etc/letsencrypt/live/chapter.test.haruyuki.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chapter.test.haruyuki.cn/privkey.pem;

    root /var/www/haruhifanclub-test/apps/chapter/dist;
    client_max_body_size 20m;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location = /api/chapter/timeline/stream {
        proxy_pass http://127.0.0.1:17778;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        add_header X-Accel-Buffering no;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:17778;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /uploads/ { alias /var/www/haruhifanclub-test/uploads/; try_files $uri =404; }
    location = /robots.txt { default_type text/plain; return 200 "User-agent: *\nDisallow: /\n"; }
    location = /sitemap.xml { return 404; }
    location ~ ^/branches/[^/]+(/events/[^/]+)?/?$ {
        proxy_pass http://127.0.0.1:17778;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /index.html;
    }
    location / { try_files $uri $uri/ /index.html; }
}
