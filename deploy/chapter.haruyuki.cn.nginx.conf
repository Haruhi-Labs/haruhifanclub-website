# Chapter 地方支部独立子站。证书签发后启用 HTTPS server 块。
server {
    listen 80;
    listen [::]:80;
    server_name chapter.haruyuki.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/haruhifanclub;
        default_type text/plain;
    }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chapter.haruyuki.cn;

    ssl_certificate     /etc/letsencrypt/live/chapter.haruyuki.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chapter.haruyuki.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/haruhifanclub/apps/chapter/dist;
    client_max_body_size 20m;
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /api/chapter/timeline/stream {
        proxy_pass http://127.0.0.1:17777;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        add_header X-Accel-Buffering no;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:17777;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
    location /uploads/ {
        alias /var/www/haruhifanclub/uploads/;
        expires 7d;
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; sandbox" always;
    }
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /api/\nDisallow: /admin/\nDisallow: /*/manage\nDisallow: /account\nDisallow: /login\nSitemap: https://chapter.haruyuki.cn/sitemap.xml\n";
    }
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:17777/sitemap-chapter.xml;
        proxy_set_header Host $host;
    }
    location ~ ^/branches/[^/]+(/events/[^/]+)?/?$ {
        proxy_pass http://127.0.0.1:17777;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /index.html;
    }
    location / { try_files $uri $uri/ /index.html; }
}
