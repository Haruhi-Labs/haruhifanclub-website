# haruhifanclub 统一反向代理（haruyuki.cn）
# 单一 Rust 后端进程监听 127.0.0.1:17777（systemd 守护，见 haruhifanclub.service）。
# 各前端 app 构建产物 apps/<app>/dist 由 Nginx 直接静态托管在对应子路径。
#
# 部署根（示例）：/var/www/haruhifanclub  —— 内含 apps/*/dist、uploads/
# 安装：将本文件放入 /etc/nginx/sites-available/ 并软链到 sites-enabled/，nginx -t && systemctl reload nginx

upstream haruhi_backend {
    server 127.0.0.1:17777;
}

server {
    listen 443 ssl http2;
    server_name haruyuki.cn;

    # ssl_certificate     /etc/letsencrypt/live/haruyuki.cn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/haruyuki.cn/privkey.pem;

    root /var/www/haruhifanclub;

    client_max_body_size 256m;   # 与后端 DefaultBodyLimit 一致（大 EPUB / 图片 / 音频）

    # ---- 统一后端 API ----
    location /api/ {
        proxy_pass         http://haruhi_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- 用户上传静态文件 ----
    # 由 Nginx 直接服务磁盘文件，绕过 Node/Rust 提升性能。
    location /uploads/ {
        alias /var/www/haruhifanclub/uploads/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # ---- 各前端 app（子路径，SPA history 回退）----
    location /news/    { alias /var/www/haruhifanclub/apps/news/dist/;    try_files $uri $uri/ /news/index.html; }
    location /art/     { alias /var/www/haruhifanclub/apps/art/dist/;     try_files $uri $uri/ /art/index.html; }
    location /exam/    { alias /var/www/haruhifanclub/apps/exam/dist/;    try_files $uri $uri/ /exam/index.html; }
    location /library/ { alias /var/www/haruhifanclub/apps/novel/dist/;   try_files $uri $uri/ /library/index.html; }
    location /shop/    { alias /var/www/haruhifanclub/apps/shop/dist/;    try_files $uri $uri/ /shop/index.html; }
    location /console/ { alias /var/www/haruhifanclub/apps/console/dist/; try_files $uri $uri/ /console/index.html; }

    # 根路径跳转到新闻站（或改为门户页）
    location = / { return 302 /news/; }
}

server {
    listen 80;
    server_name haruyuki.cn;
    return 301 https://$host$request_uri;
}
