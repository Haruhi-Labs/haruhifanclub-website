# haruhifanclub 统一反向代理（haruyuki.cn）
# 单一 Rust 后端进程监听 127.0.0.1:17777（systemd 守护，见 haruhifanclub.service）。
# 各前端 app 构建产物 apps/<app>/dist 由 Nginx 直接静态托管在对应子路径。
#
# 部署根（示例）：/var/www/haruhifanclub  —— 内含 apps/*/dist、uploads/
# 安装：将本文件放入 /etc/nginx/sites-available/ 并软链到 sites-enabled/，nginx -t && systemctl reload nginx

upstream haruhi_backend {
    server 127.0.0.1:17777;
}

server {
    listen 443 ssl http2;
    server_name haruyuki.cn;

    # ssl_certificate     /etc/letsencrypt/live/haruyuki.cn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/haruyuki.cn/privkey.pem;

    # TLS 加固（启用证书后生效）：仅 TLS1.2/1.3，禁用弱算法
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/haruhifanclub;
    server_tokens off;           # 不暴露 nginx 版本

    client_max_body_size 256m;   # 与后端 DefaultBodyLimit 一致（大 EPUB / 图片 / 音频）

    # 安全响应头（纵深防御）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # 注：未在此设置全站 CSP——各前端 app 用到的外部源（OpenCC/Live2D/字体等）需逐一允许，
    # 贸然加 default-src 'self' 会破坏页面。建议联调后按 app 启用，示例：
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;

    # ---- 统一后端 API ----
    location /api/ {
        proxy_pass         http://haruhi_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- 画廊缩略图：静态直出，未命中回源后端现场生成 ----
    # 路径布局须与后端 thumb_cache_path / 前端 thumbUrl 一致：
    #   /uploads/art/.thumbs/<w>/<sub>.<srcext>.webp
    # 命中即静态直出（零后端开销）；未命中走 @thumb_fallback 回源 /api/art/thumb，
    # 后端用 libvips 生成并落盘，下次访问即静态命中。^~ 保证优先级高于任何正则
    # location（含可能的 dotfile deny），故 .thumbs 点目录可正常服务。
    location ^~ /uploads/art/.thumbs/ {
        alias /var/www/haruhifanclub/uploads/art/.thumbs/;
        expires 30d;
        access_log off;
        try_files $uri @thumb_fallback;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; sandbox" always;
    }
    location @thumb_fallback {
        # /uploads/art/.thumbs/640/2026-06/x.webp.webp → /api/art/thumb?path=art/2026-06/x.webp&w=640
        rewrite ^/uploads/art/\.thumbs/(\d+)/(.+)\.([^.]+)\.webp$ /api/art/thumb?path=art/$2.$3&w=$1 break;
        proxy_pass         http://haruhi_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- 用户上传静态文件 ----
    # 由 Nginx 直接服务磁盘文件，绕过 Node/Rust 提升性能。
    location /uploads/ {
        alias /var/www/haruhifanclub/uploads/;
        expires 7d;
        access_log off;
        try_files $uri =404;
        # 用户上传内容：直接访问时沙箱化并禁止脚本，杜绝恶意 SVG 直链 XSS。
        # （location 内一旦有 add_header，server 级别的不再继承，故此处重声明 nosniff）
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; media-src 'self'; sandbox" always;
    }

    # ---- 各前端 app（子路径，SPA history 回退）----
    location /news/    { alias /var/www/haruhifanclub/apps/news/dist/;    try_files $uri $uri/ /news/index.html; }
    location /art/     { alias /var/www/haruhifanclub/apps/art/dist/;     try_files $uri $uri/ /art/index.html; }
    location /exam/    { alias /var/www/haruhifanclub/apps/exam/dist/;    try_files $uri $uri/ /exam/index.html; }
    location /library/ { alias /var/www/haruhifanclub/apps/novel/dist/;   try_files $uri $uri/ /library/index.html; }
    location /novel/ { alias /var/www/haruhifanclub/apps/fiction/dist/; try_files $uri $uri/ /novel/index.html; }
    location /shop/    { alias /var/www/haruhifanclub/apps/shop/dist/;    try_files $uri $uri/ /shop/index.html; }
    location /console/ { alias /var/www/haruhifanclub/apps/console/dist/; try_files $uri $uri/ /console/index.html; }
    location /design-system/ { alias /var/www/haruhifanclub/apps/design-system/dist/; try_files $uri $uri/ /design-system/index.html; }

    # 根路径跳转到新闻站（或改为门户页）
    location = / { return 302 /news/; }
}

server {
    listen 80;
    server_name haruyuki.cn;
    return 301 https://$host$request_uri;
}
