# 临时测试站点 test.haruyuki.cn —— 独立 server 块，按 server_name 路由，不影响其它站点。
# HTTPS（Let's Encrypt），后端走测试站端口 127.0.0.1:17778（生产占 17777，两实例同机共存）。
# 安装：放 /etc/nginx/sites-available/test.haruyuki.cn 并软链到 sites-enabled/，nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name test.haruyuki.cn;

    # ACME 续期验证（certbot webroot）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/haruhifanclub-test;
        default_type "text/plain";
    }
    # 其余一律跳 HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test.haruyuki.cn;

    ssl_certificate     /etc/letsencrypt/live/test.haruyuki.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.haruyuki.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头（纵深防御；未上 CSP——各 app 用了 CDN，需单独调）
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 256m;
    access_log /var/log/nginx/haruhifanclub-test.access.log;
    error_log  /var/log/nginx/haruhifanclub-test.error.log;

    # 统一后端 API（测试站端口 17778）
    location /api/ {
        proxy_pass http://127.0.0.1:17778;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 画廊缩略图：静态直出，未命中回源后端（见 deploy/nginx.conf 注释）
    location ^~ /uploads/art/.thumbs/ {
        alias /var/www/haruhifanclub-test/uploads/art/.thumbs/;
        expires 30d;
        access_log off;
        try_files $uri @thumb_fallback;
        add_header Cache-Control "public, immutable" always;
        # location 级 add_header 会断 server 级继承，故与生产对齐补齐安全头
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; sandbox" always;
    }
    location @thumb_fallback {
        rewrite ^/uploads/art/\.thumbs/(\d+)/(.+)\.([^.]+)\.webp$ /api/art/thumb?path=art/$2.$3&w=$1 break;
        proxy_pass http://127.0.0.1:17778;
        proxy_set_header Host $host;
    }

    # 用户上传静态文件
    location /uploads/ {
        alias /var/www/haruhifanclub-test/uploads/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # 各前端 app（子路径 SPA history 回退）
    location /news/    { alias /var/www/haruhifanclub-test/apps/news/dist/;    try_files $uri $uri/ /news/index.html; }
    location /art/     { alias /var/www/haruhifanclub-test/apps/art/dist/;     try_files $uri $uri/ /art/index.html; }
    location /exam/    { alias /var/www/haruhifanclub-test/apps/exam/dist/;    try_files $uri $uri/ /exam/index.html; }
    location /library/ { alias /var/www/haruhifanclub-test/apps/novel/dist/;   try_files $uri $uri/ /library/index.html; }
    location /fiction/ { alias /var/www/haruhifanclub-test/apps/fiction/dist/; try_files $uri $uri/ /fiction/index.html; }
    location /shop/    { alias /var/www/haruhifanclub-test/apps/shop/dist/;    try_files $uri $uri/ /shop/index.html; }
    location /console/ { alias /var/www/haruhifanclub-test/apps/console/dist/; try_files $uri $uri/ /console/index.html; }
    location /design-system/ { alias /var/www/haruhifanclub-test/apps/design-system/dist/; try_files $uri $uri/ /design-system/index.html; }

    location = / { return 302 /news/; }
}
