name: 功能建议
description: 提出一个新功能或改进想法
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议！请描述清楚你的动机与设想，方便我们评估。
        提交前请先搜索现有 issue，避免重复。
  - type: textarea
    id: motivation
    attributes:
      label: 动机 / 背景
      description: 你遇到了什么问题或痛点？这个功能能解决什么？
      placeholder: 例如「在 X 场景下，目前需要手动 …，希望能 …」。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案提案
      description: 描述你希望实现的功能或交互。
    validations:
      required: true
  - type: dropdown
    id: modules
    attributes:
      label: 受影响模块
      description: 选择本功能涉及的模块（可多选）。
      multiple: true
      options:
        - "app: news"
        - "app: art"
        - "app: exam"
        - "app: novel"
        - "app: shop"
        - "app: console"
        - "api-client"
        - "backend: server"
        - "backend: core"
        - "backend: db"
        - "backend: auth"
        - "backend: media"
        - "backend: ai"
        - "backend: mail"
        - "deploy"
        - "ci"
        - "docs"
        - "不确定 / 其它"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些其它做法？为什么当前提案更优？
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 其它上下文、参考链接、示意图等。
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 issue，确认未重复
          required: true
