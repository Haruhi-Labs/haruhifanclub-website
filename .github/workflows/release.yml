name: Release

# 推送形如 v1.2.3 的 tag 时触发：生成本次发布的 CHANGELOG 片段并创建 GitHub Release。
on:
  push:
    tags:
      - "v*"

# 顶层最小权限；本 workflow 需要写仓库内容（创建 Release / 可选回写 CHANGELOG）。
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码（含完整历史与 tag）
        uses: actions/checkout@v4
        with:
          # git-cliff 需要完整提交历史与全部 tag 才能正确划分版本区间
          fetch-depth: 0

      # 用 cliff.toml 生成"最新一个 tag 区间"的 changelog，作为本次 Release 正文
      - name: 生成本次发布的 changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # --latest 仅取当前 tag 对应的版本区块；--strip header 去掉顶部标题只留正文
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Release 名称用 tag 名（如 v0.1.0）
          name: ${{ github.ref_name }}
          # 正文用上一步生成的 changelog 片段
          body: ${{ steps.changelog.outputs.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 可选：把更新后的完整 CHANGELOG.md 回写到 main 分支。
      #
      # 关键顺序（务必先切分支、再生成 CHANGELOG）：
      #   tag 推送时 HEAD 处于 detached 状态；必须在工作树仍"干净"时先 git checkout main，
      #   然后才让 git-cliff 把全量 CHANGELOG.md 写进工作区。否则若先生成（工作树变脏），
      #   而 main 上的 CHANGELOG.md 与当前 tag 提交处的内容不同（首次回写之后的每次发布都如此），
      #   git checkout main 会因"本地修改将被检出操作覆盖"而失败，导致回写步骤崩溃。
      - name: 切换到 main 分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # fetch-depth:0 已拉取 origin/main；此处 DWIM 创建并切到本地 main（工作树此刻干净）
          git checkout main

      # 在 main 之上生成"全量"CHANGELOG（上一 Release 片段是 --latest，不能复用）。
      # tag 切到 main 后依然可被 --tag 解析（tag 独立于分支），git-cliff 行为不变。
      - name: 生成全量 CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ github.ref_name }}
        env:
          OUTPUT: CHANGELOG.md

      - name: 回写 CHANGELOG.md 到 main
        run: |
          # 用刚生成的全量 CHANGELOG 覆盖（git-cliff 已写入工作区）
          git add CHANGELOG.md
          # 无变更时跳过提交，避免空提交导致 step 失败
          if git diff --staged --quiet; then
            echo "CHANGELOG.md 无变更，跳过提交"
          else
            # [skip ci] 防止回写提交再次触发 CI
            git commit -m "docs(release): 更新 ${{ github.ref_name }} 的 CHANGELOG [skip ci]"
            git push origin main
          fi
