# 多项目路径过滤 + 分层的协作级 CI。
#
# 分层（PR 求快、合入 main 后求全）：
#   - PR：后端只跑 fmt + clippy(lib+bins) + 单测(`cargo test --lib`)，前端按改动 app 构建。快。
#   - push 到 main：后端跑全量 clippy(--all-targets) + 完整测试(含 tests/ 集成)，外加依赖审计。全。
# 后端不再跑 `cargo build --release`（部署时用 Docker 交叉编译，CI 里冗余且慢）。
#
# branch protection（务必照做）：dorny/paths-filter 会让无关 job 被 skip，
# 被 skip 的 job 永不上报状态——**把底部聚合 gate「ci-ok」设为唯一的 required status check**，
# 不要直接 require frontend/backend/backend-full。
name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支/PR 的新推送取消仍在跑的旧运行，省 runner。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 顶层最小权限；各 job 按需自行提权。
permissions:
  contents: read

jobs:
  # 路径过滤：判断本次改动是否涉及前端 / 后端。
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  # 前端：安装依赖 + JS lint + 用 matrix 对 6 个 app 各自 build（fail-fast:false 便于定位单 app 失败）。
  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [news, art, exam, novel, shop, console]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:js
      - run: pnpm --filter @haruhi/${{ matrix.app }} build

  # 后端 · PR 快检：fmt + clippy(lib+bins，不编 tests/) + 单测（`cargo test --lib`，不含集成）。
  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace --lib

  # 后端 · 合入后完整测试：仅 push 到 main 时跑。全量 clippy(--all-targets) + 完整测试(含 tests/ 集成)。
  backend-full:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # 依赖漏洞审计（信息性，continue-on-error）。较慢，**仅合入 main 后**跑，不拖慢 PR。
  audit:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: pnpm audit (prod deps)
        run: pnpm install --frozen-lockfile && pnpm audit --prod || true
      - uses: dtolnay/rust-toolchain@1.87.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo audit
        run: cargo install cargo-audit --locked && cargo audit || true

  # 聚合 gate：branch protection 唯一的 required check。
  # audit 是信息性的，不纳入硬门禁。
  # 规则：changes 必须 success（路径过滤源头，坏了不能放行）；
  #       frontend / backend / backend-full 允许 success 或 skipped（按事件/路径正常跳过），其余即失败。
  ci-ok:
    needs: [changes, frontend, backend, backend-full]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: 汇总各 job 结论
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          BACKEND_FULL_RESULT: ${{ needs.backend-full.result }}
        run: |
          echo "changes=$CHANGES_RESULT frontend=$FRONTEND_RESULT backend=$BACKEND_RESULT backend-full=$BACKEND_FULL_RESULT"
          ok=1
          # 源头 job：必须 success。
          if [ "$CHANGES_RESULT" != "success" ]; then
            ok=0
          fi
          # 业务 job：success 或 skipped（路径过滤 / 事件分层跳过）皆可，其余判失败。
          for r in "$FRONTEND_RESULT" "$BACKEND_RESULT" "$BACKEND_FULL_RESULT"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              ok=0
            fi
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::CI 门禁未通过（changes 必须 success；frontend/backend/backend-full 必须 success 或 skipped）"
            exit 1
          fi
          echo "全部必需 job 通过或被合理跳过，CI 门禁放行。"
