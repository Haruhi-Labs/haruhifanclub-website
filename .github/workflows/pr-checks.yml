name: PR Checks

# PR 标题语义校验（靠 CI 把关，无本地 hooks）。
# 本仓用 **squash 合并**——PR 标题就是最终落到 main 的提交信息，所以**只校验 PR 标题**；
# PR 里的中间提交会被 squash 丢弃，无需逐条校验。
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

# 取消同一 PR 的旧运行，仅保留最新一次
concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# 顶层最小权限
permissions:
  contents: read

jobs:
  # 校验 PR 标题符合 Conventional Commits（squash 合并的最终提交信息来源）
  semantic-pr-title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      # amannn/action-semantic-pull-request@v5 默认通过 Checks API 上报结果，需要 checks:write
      checks: write
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # type 唯一受约束项
          types: |
            feat
            fix
            perf
            refactor
            docs
            style
            test
            build
            ci
            chore
            revert
          # scope 自由、不限定取值：不传 scopes 即只校验 type，scope 写法建议见 CONTRIBUTING.md。
          requireScope: false
          # subject 允许中文（默认正则会拒绝非 ASCII 起始）；这里允许任意非空 subject
          subjectPattern: ^.+$
          subjectPatternError: |
            PR 标题的 subject 部分（"type(scope): " 之后）不能为空。
          # 允许 WIP 草稿 PR 跳过校验
          wip: true
