name: PR Checks

# PR 标题语义校验（靠 CI 把关，无本地 hooks）。
# 本仓用 **squash 合并**——PR 标题就是最终落到 main 的提交信息，所以**只校验 PR 标题**；
# PR 里的中间提交会被 squash 丢弃，无需逐条校验。
on:
  # 只读取 PR 元数据，不 checkout 或执行 PR 分支代码。
  # Dependabot PR 在 pull_request 下的 token 权限较窄，semantic action 写检查会报
  # "Resource not accessible by integration"，因此这里按官方建议使用 pull_request_target。
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

# 取消同一 PR 的旧运行，仅保留最新一次
concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # 校验 PR 标题符合 Conventional Commits（squash 合并的最终提交信息来源）
  semantic-pr-title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # type 唯一受约束项
          types: |
            feat
            fix
            perf
            refactor
            docs
            style
            test
            build
            ci
            chore
            revert
          # scope 自由、不限定取值：不传 scopes 即只校验 type，scope 写法建议见 CONTRIBUTING.md。
          requireScope: false
          # subject 允许中文（默认正则会拒绝非 ASCII 起始）；这里允许任意非空 subject
          subjectPattern: ^.+$
          subjectPatternError: |
            PR 标题的 subject 部分（"type(scope): " 之后）不能为空。
